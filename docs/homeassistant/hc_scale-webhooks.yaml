webhooks_hc_scale_pack:
  # ═══════════════════════════════════════════════════════════════════════
  # Home Assistant Webhook-Vorlage für hc_scale (Mi Body Composition Scale)
  # ═══════════════════════════════════════════════════════════════════════
  #
  # Konfiguration in .env:
  #   HA_WEBHOOK_URL=http://192.168.1.xxx:8123
  #   HA_WEBHOOK_ID=miscale
  #
  # Verfügbare Events & Payload-Felder:
  # ┌──────────────────────┬──────────────────────────────────────────────────────────────┐
  # │ Event                │ Felder                                                       │
  # ├──────────────────────┼──────────────────────────────────────────────────────────────┤
  # │ measurement          │ user, weight, impedance, bmi, body_fat, muscle_mass, water   │
  # │ unknown_user         │ weight, name                                                 │
  # └──────────────────────┴──────────────────────────────────────────────────────────────┘
  #
  # Alle Payloads enthalten: event, device ("home-miscale"), timestamp
  #
  # Beispiel-Payload (measurement):
  # {
  #   "event": "measurement",
  #   "device": "home-miscale",
  #   "timestamp": "2026-07-03 14:32:01",
  #   "user": "Peter",
  #   "weight": 73.25,
  #   "impedance": 593,
  #   "bmi": 23.1,
  #   "body_fat": 18.5,
  #   "muscle_mass": 56.2,
  #   "water": 58.3
  # }
  # ═══════════════════════════════════════════════════════════════════════


  # ─────────────────────────────────────────────────────────────────────
  # AUTOMATIONS (→ automations.yaml)
  # ─────────────────────────────────────────────────────────────────────

  automation:

    - alias: "Mi Scale Webhook Empfänger"
      id: miscale_webhook
      mode: queued
      max: 5

      trigger:
        - platform: webhook
          webhook_id: miscale
          allowed_methods:
            - POST
          local_only: true

      action:
        - choose:

            # ── Neue Messung ──
            - conditions:
                - condition: template
                  value_template: "{{ trigger.json.event == 'measurement' }}"
              sequence:
                - service: logbook.log
                  data:
                    name: Mi Scale
                    message: >-
                      {{ trigger.json.user }}: {{ trigger.json.weight }} kg ·
                      BMI {{ trigger.json.bmi | default('?') }} ·
                      Fett {{ trigger.json.body_fat | default('?') }}%
                - service: notify.notify
                  data:
                    title: "⚖️ {{ trigger.json.user }}"
                    message: >-
                      {{ trigger.json.weight }} kg · BMI {{ trigger.json.bmi | default('?') }}
                      · Fett {{ trigger.json.body_fat | default('?') }}%
                      · Muskeln {{ trigger.json.muscle_mass | default('?') }} kg
                      · Wasser {{ trigger.json.water | default('?') }}%

            # ── Unbekannter User ──
            - conditions:
                - condition: template
                  value_template: "{{ trigger.json.event == 'unknown_user' }}"
              sequence:
                - service: persistent_notification.create
                  data:
                    title: "⚖️ Unbekannte Messung"
                    message: >-
                      Gewicht: {{ trigger.json.weight | default('?') }} kg
                      (Name: {{ trigger.json.name | default('–') }})
                    notification_id: miscale_unknown_user

          default:
            - service: logbook.log
              data:
                name: Mi Scale
                message: >-
                  Unbekanntes Event: {{ trigger.json.event if trigger.json is defined else 'kein JSON' }}


  # ─────────────────────────────────────────────────────────────────────
  # TEMPLATE SENSOREN (→ configuration.yaml)
  # ─────────────────────────────────────────────────────────────────────

  template:
    - trigger:
        - platform: webhook
          webhook_id: miscale
          allowed_methods:
            - POST
          local_only: true
      sensor:
        - name: "Waage letztes Gewicht"
          unique_id: miscale_last_weight
          state: "{{ trigger.json.weight | default(0) }}"
          unit_of_measurement: "kg"
          device_class: weight
          state_class: measurement
          icon: "mdi:scale-bathroom"
          availability: "{{ trigger.json.event == 'measurement' }}"
          attributes:
            user: "{{ trigger.json.user | default('') }}"

        - name: "Waage letzter BMI"
          unique_id: miscale_last_bmi
          state: "{{ trigger.json.bmi | default(0) }}"
          icon: "mdi:human"
          availability: "{{ trigger.json.event == 'measurement' }}"
          attributes:
            user: "{{ trigger.json.user | default('') }}"

        - name: "Waage Körperfett"
          unique_id: miscale_last_body_fat
          state: "{{ trigger.json.body_fat | default(0) }}"
          unit_of_measurement: "%"
          icon: "mdi:percent"
          availability: "{{ trigger.json.event == 'measurement' }}"
          attributes:
            user: "{{ trigger.json.user | default('') }}"

        - name: "Waage Muskelmasse"
          unique_id: miscale_last_muscle
          state: "{{ trigger.json.muscle_mass | default(0) }}"
          unit_of_measurement: "kg"
          device_class: weight
          icon: "mdi:arm-flex"
          availability: "{{ trigger.json.event == 'measurement' }}"
          attributes:
            user: "{{ trigger.json.user | default('') }}"

        - name: "Waage Wasseranteil"
          unique_id: miscale_last_water
          state: "{{ trigger.json.water | default(0) }}"
          unit_of_measurement: "%"
          icon: "mdi:water-percent"
          availability: "{{ trigger.json.event == 'measurement' }}"
          attributes:
            user: "{{ trigger.json.user | default('') }}"

        - name: "Waage letzter User"
          unique_id: miscale_last_user
          state: "{{ trigger.json.user | default('–') }}"
          icon: "mdi:account"
          availability: "{{ trigger.json.event == 'measurement' }}"
