services:
  hc_scale:
    build: .
    container_name: hc_scale_dev
    restart: unless-stopped

    ports:
      - "5000:5056"

    # Lokalen Code mounten → Änderungen sofort sichtbar
    volumes:
      - .:/app
      - ${PWD}/data:/app/data
      - ${PWD}/config:/app/config
      - ${PWD}/frontend:/app/frontend
      - ${PWD}/logs:/app/logs

    env_file:
      - .env

    environment:
      - TZ=Europe/Vaduz
      - ROOT_PATH=/dashboardmiscale

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5056/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
