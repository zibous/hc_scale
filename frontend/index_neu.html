<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_title }}</title>
  <link rel="stylesheet" href="static/css/style.css">
  <!-- Externe Bibliotheken -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
</head>
<body>
  <div class="hdr">
    <h1>{{ app_title }}</h1>
    <div class="ctl">
      <select id="uSel"></select>
      <input type="date" id="dFrom" title="Von">
      <input type="date" id="dTo" title="Bis">
      <button id="goBtn">▶</button>
      <button id="p30">30d</button><button id="p90">90d</button><button id="p365">1J</button><button id="pAll">All</button>
      <button id="csvBtn" title="CSV Export">💾 CSV</button>
      <input type="color" id="bgColor" title="Hintergrundfarbe">
      <button id="bgReset" title="Farbe zurücksetzen">↺</button>
      <button id="thBtn">☾</button>
    </div>
  </div>
  <div class="wrap">
    <div id="loadBox" class="loading">Lade Daten...</div>
    <div id="content" style="display:none">
      <div class="info-bar" id="infoBar">
        <img class="avatar" id="avatar" src="" alt="Avatar">
        <div class="info-text" id="infoText"></div>
      </div>
      <div class="cards" id="cards"></div>
      <div class="cw"><h3 class="ct">Gewicht (mit Trend) &amp; Fettfreie Masse</h3><canvas id="c1"></canvas><div class="summary" id="s1"></div></div>
      <div class="row2">
        <div class="cw"><h3 class="ct">Zusammenfassung (Gewicht / Muskeln / BMI)</h3><canvas id="c2"></canvas><div class="summary" id="s2"></div></div>
        <div class="cw"><h3 class="ct">Körperfett &amp; Viszeralfett</h3><canvas id="c3"></canvas><div class="summary" id="s3"></div></div>
      </div>
      <div class="row2">
        <div class="cw"><h3 class="ct">Muskeln &amp; Protein</h3><canvas id="c4"></canvas><div class="summary" id="s4"></div></div>
        <div class="cw"><h3 class="ct">Körperwerte (normalisiert)</h3><canvas id="c5"></canvas><div class="summary" id="s5"></div></div>
      </div>
      <div class="row2">
        <div class="cw"><h3 class="ct">Makronährstoffe (kcal/Tag)</h3><canvas id="c6"></canvas><div class="summary" id="s6"></div></div>
        <div class="cw"><h3 class="ct" id="c7title">Veränderung</h3><canvas id="c7"></canvas><div class="summary" id="s7"></div></div>
      </div>
    </div>
  </div>
  <div class="ft">home-miscale &bull; v2.1.0</div>
  <!-- Einstiegspunkt für ESM Module -->
  <script type="module" src="static/js/app.js"></script>
</body>
</html>
